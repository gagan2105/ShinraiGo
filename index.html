<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shinrai Go | Advanced AI Tourist Safety</title>
    <script>
      const renderError = (title, message, stack) => {
         document.body.innerHTML = `
            <div style="background:#020617; color:#94a3b8; padding:40px; font-family:'Inter', sans-serif; position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center;">
               <div style="max-width:600px; width:100%; bg:#0f172a; border:1px solid #1e293b; padding:32px; border-radius:16px; box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);">
                  <div style="color:#ef4444; font-weight:900; font-size:12px; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px;">System Fault</div>
                  <h1 style="color:#f8fafc; font-size:24px; margin-bottom:16px;">${title}</h1>
                  <p style="font-size:14px; margin-bottom:24px;">Message: ${message}</p>
                  <pre style="background:#020617; padding:16px; border-radius:8px; font-size:11px; overflow:auto; max-height:200px; color:#64748b;">${stack || 'No stack trace available'}</pre>
                  <button onclick="window.location.reload()" style="margin-top:24px; background:#4f46e5; color:white; border:none; padding:12px 24px; border-radius:8px; font-weight:700; cursor:pointer; width:100%;">Reboot Core</button>
               </div>
            </div>
         `;
      };
      window.onerror = (msg, src, ln, col, err) => renderError('Application Crash', msg, err?.stack);
      window.onunhandledrejection = (e) => renderError('Promise Rejection', e.reason?.message || e.reason, e.reason?.stack);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
